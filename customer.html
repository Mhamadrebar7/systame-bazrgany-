<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>مامەڵەکانم</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e1a; --bg2:#0f1525; --bg3:#141c2e; --card:#111827;
  --border:#1e2d45; --border2:#2a3f5f;
  --primary:#4f8ef7; --primary-d:#3a6fd4;
  --ok:#34d399; --ok-bg:rgba(52,211,153,.1);
  --bad:#f87171; --bad-bg:rgba(248,113,113,.1);
  --warn:#fbbf24; --warn-bg:rgba(251,191,36,.1);
  --text:#e2e8f0; --muted:#6b7fa3; --faint:#2a3f5f;
  --r:14px; --rs:9px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;font-size:14px;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.header{background:linear-gradient(160deg,#071630 0%,#0f2040 40%,#0d2850 100%);padding:28px 20px 0;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(79,142,247,.18) 0%,transparent 70%);pointer-events:none}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(79,142,247,.3),transparent)}
.header-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center}
.shop-logo{width:58px;height:58px;background:linear-gradient(135deg,rgba(79,142,247,.2),rgba(79,142,247,.05));border:1.5px solid rgba(79,142,247,.3);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:12px;box-shadow:0 0 30px rgba(79,142,247,.15)}
.shop-name{font-size:19px;font-weight:800;color:#fff;margin-bottom:3px}
.customer-welcome{font-size:12px;color:rgba(255,255,255,.45);margin-bottom:16px}
.debt-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:20px}
.debt-pill.has-debt{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:var(--bad)}
.debt-pill.no-debt{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);color:var(--ok)}
.quick-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid rgba(255,255,255,.06);margin:0 -20px}
.qs-item{padding:12px 8px;text-align:center;border-left:1px solid rgba(255,255,255,.06)}
.qs-item:last-child{border-left:none}
.qs-val{font-size:13px;font-weight:800;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qs-lbl{font-size:9px;color:var(--muted);letter-spacing:.5px;font-weight:600;text-transform:uppercase}

.tabs-wrap{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;backdrop-filter:blur(12px)}
.tabs{display:flex;max-width:600px;margin:0 auto}
.tab{flex:1;padding:13px 4px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:5px}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);background:rgba(79,142,247,.04)}
.tab:active{opacity:.7}

.content{padding:14px 14px 30px;max-width:600px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.ctitle{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:12px;letter-spacing:.6px;text-transform:uppercase;display:flex;align-items:center;gap:6px;justify-content:space-between}

.sum-box{background:linear-gradient(135deg,rgba(79,142,247,.08),rgba(79,142,247,.03));border:1px solid rgba(79,142,247,.2);border-radius:var(--r);padding:14px;margin-bottom:12px}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04)}
.sum-row:last-child{border:none}
.sum-row .lbl{color:var(--muted);font-size:12px}
.sum-row .val{font-weight:700}
.sum-total{display:flex;justify-content:space-between;align-items:center;padding:9px 0 0;margin-top:6px;border-top:1px solid rgba(255,255,255,.1);font-size:15px;font-weight:800}

.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.scard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:13px 10px;text-align:center}
.scard.ok{border-color:rgba(52,211,153,.25);background:var(--ok-bg)}
.scard.bad{border-color:rgba(248,113,113,.25);background:var(--bad-bg)}
.scard.info{border-color:rgba(79,142,247,.25);background:rgba(79,142,247,.07)}
.sv{font-size:14px;font-weight:800;margin:4px 0 3px}
.sl{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.si{font-size:20px}

.ev-list{display:flex;flex-direction:column;gap:7px}
.ev-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:11px 13px;display:flex;align-items:center;gap:10px;animation:fadeUp .2s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.ev-icon{font-size:18px;flex-shrink:0;width:32px;text-align:center}
.ev-info{flex:1;min-width:0}
.ev-title{font-size:12px;font-weight:600;margin-bottom:2px}
.ev-meta{font-size:11px;color:var(--muted);line-height:1.4}
.ev-amount{font-size:13px;font-weight:800;flex-shrink:0;text-align:left}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.b-ok{background:var(--ok-bg);color:var(--ok)}
.b-bad{background:var(--bad-bg);color:var(--bad)}
.b-warn{background:var(--warn-bg);color:var(--warn)}
.b-info{background:rgba(79,142,247,.1);color:var(--primary)}

.wa-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,#128C7E,#25D366);color:#fff;border:none;border-radius:var(--rs);padding:13px 20px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;width:100%;text-decoration:none;transition:all .2s;box-shadow:0 4px 20px rgba(37,211,102,.2);margin-bottom:8px}
.wa-btn:hover{box-shadow:0 6px 28px rgba(37,211,102,.35);transform:translateY(-1px)}
.wa-btn svg{width:19px;height:19px;fill:#fff;flex-shrink:0}

.print-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,#1e3a5f,#2a4f7f);color:#fff;border:1px solid rgba(79,142,247,.3);border-radius:var(--rs);padding:12px 20px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;width:100%;transition:all .2s}
.print-btn:hover{background:linear-gradient(135deg,#2a4f7f,#3a6fd4)}
.print-btn:active{transform:scale(.98)}

.progress-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:10px}
.progress-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.progress-label{font-size:10px;color:var(--muted);margin-top:4px;text-align:left}

.tok{color:var(--ok)}.tbad{color:var(--bad)}.twarn{color:var(--warn)}.tprimary{color:var(--primary)}.fw8{font-weight:800}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .ei{font-size:40px;display:block;margin-bottom:12px;opacity:.6}
.empty p{font-size:12px;line-height:1.8}
.footer{text-align:center;padding:24px 20px;color:var(--faint);font-size:10px;letter-spacing:.5px}

/* PRINT — تەنها print دەکاتەوە */
@media print{
  .tabs-wrap,.wa-btn,.print-btn,.no-print{display:none!important}
  body{background:#fff!important;color:#111!important}
  .header{background:#0f2040!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .shop-name{color:#fff!important}
  .customer-welcome{color:rgba(255,255,255,.7)!important}
  .qs-val{color:#111!important}
  .quick-stats{background:#f5f7fa}
  .content{padding:0!important;max-width:100%!important}
  .card{background:#fff!important;border:1px solid #ddd!important;page-break-inside:avoid}
  .ctitle{color:#666!important}
  .sum-box{background:#eff6ff!important;border:1px solid #c0d4f0!important;-webkit-print-color-adjust:exact}
  .sum-row .lbl{color:#666!important}
  .ev-item{background:#f9fafb!important;border:1px solid #e5e7eb!important;page-break-inside:avoid}
  .ev-meta{color:#666!important}
  .sgrid{display:grid!important;grid-template-columns:1fr 1fr!important}
  .scard{background:#f9fafb!important;border:1px solid #e5e7eb!important}
  .scard.ok{background:#ecfdf5!important;border-color:#6ee7b7!important;-webkit-print-color-adjust:exact}
  .scard.bad{background:#fef2f2!important;border-color:#fca5a5!important;-webkit-print-color-adjust:exact}
  .scard.info{background:#eff6ff!important;border-color:#93c5fd!important;-webkit-print-color-adjust:exact}
  .sv,.sl{color:#333!important}
  .tok{color:#059669!important}.tbad{color:#dc2626!important}.tprimary{color:#2563eb!important}
  .progress-bar{background:#e5e7eb!important}
  .progress-fill{-webkit-print-color-adjust:exact!important}
  .debt-pill.has-debt{background:#fef2f2!important;color:#dc2626!important;border-color:#fca5a5!important;-webkit-print-color-adjust:exact}
  .debt-pill.no-debt{background:#ecfdf5!important;color:#059669!important;border-color:#6ee7b7!important;-webkit-print-color-adjust:exact}
  .badge.b-ok{background:#ecfdf5!important;color:#059669!important}
  .badge.b-bad{background:#fef2f2!important;color:#dc2626!important}
  .badge.b-warn{background:#fffbeb!important;color:#d97706!important}
  .footer{color:#999!important}
  @page{margin:12mm;size:A4}
}
</style>
</head>
<body>

<div id="root">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px">
    <div style="width:32px;height:32px;border:2.5px solid #1e2d45;border-top-color:#4f8ef7;border-radius:50%;animation:spin .8s linear infinite"></div>
    <div style="color:#6b7fa3;font-size:12px">چاوەڕێبە...</div>
  </div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<script>
const DB = { get: k => { try { return JSON.parse(localStorage.getItem('pm_'+k)||'null'); } catch { return null; } } };

function getCurrencies() {
  return DB.get('currencies') || [
    {code:'IQD',rateToUSD:1480,symbol:'IQD',flag:'🇮🇶'},
    {code:'USD',rateToUSD:1,symbol:'$',flag:'🇺🇸'},
  ];
}
const toUSD   = (a,c) => { const x=getCurrencies().find(v=>v.code===c); return x?(parseFloat(a)||0)/x.rateToUSD:parseFloat(a)||0; };
const fromUSD = (u,c) => { const x=getCurrencies().find(v=>v.code===c); return x?(parseFloat(u)||0)*x.rateToUSD:parseFloat(u)||0; };
function fmtN(n,d){ const num=parseFloat(n||0); if(d===undefined)d=num>=100?0:2; return num.toLocaleString('en',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtC(a,c){ const x=getCurrencies().find(v=>v.code===c)||{symbol:c}; const d=(c==='IQD'||c==='IRR')?0:2; return x.symbol+' '+fmtN(a,d); }
function today(){ return new Date().toISOString().split('T')[0]; }
function getProducts()  { return DB.get('products') || []; }
function getAllEvents()  { return DB.get('events')   || []; }
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function makeCustomerToken(buyer,phone){
  const raw=(buyer||'')+'|'+(phone||'');let hash=5381;
  for(let i=0;i<raw.length;i++)hash=((hash<<5)+hash)^raw.charCodeAt(i);
  return Math.abs(hash).toString(36)+(buyer||'x').slice(0,3).replace(/\s/g,'');
}
function getTokenFromURL(){ const p=new URLSearchParams(location.search); return p.get('t')||p.get('token')||''; }

function getCustomerData(token){
  if(!token) return null;
  const allEvs=getAllEvents(), prods=getProducts();
  const myEvs=allEvs.filter(ev=>{
    if(ev.customerToken===token) return true;
    if(!ev.customerToken&&(ev.buyer||ev.phone)) return makeCustomerToken(ev.buyer||'',ev.phone||'')===token;
    return false;
  });
  if(!myEvs.length) return null;
  const first=myEvs.find(e=>e.buyer)||myEvs[0];
  const name=first.buyer||'کڕیار', phone=first.phone||'';
  let totalBoughtUSD=0,totalDebtUSD=0,totalPaidUSD=0;
  const txs=[];
  myEvs.forEach(ev=>{
    const prod=prods.find(p=>p.id==ev.productId);
    const pname=prod?prod.name:'—', punit=prod?prod.unit:'';
    if(ev.type==='sell_cash'){ totalBoughtUSD+=toUSD(ev.totalPrice,ev.currency); txs.push({type:'sell_cash',date:ev.date,prod:pname,unit:punit,qty:ev.qty,amount:ev.totalPrice,currency:ev.currency,note:ev.note||''}); }
    if(ev.type==='sell_debt'){ totalBoughtUSD+=toUSD(ev.totalPrice,ev.currency); totalDebtUSD+=toUSD(ev.totalPrice,ev.currency); txs.push({type:'sell_debt',date:ev.date,prod:pname,unit:punit,qty:ev.qty,amount:ev.totalPrice,currency:ev.currency,dueDate:ev.dueDate||'',note:ev.note||''}); }
    if(ev.type==='debt_pay'){ totalPaidUSD+=toUSD(ev.amount,ev.currency); txs.push({type:'debt_pay',date:ev.date,prod:'',unit:'',qty:null,amount:ev.amount,currency:ev.currency,note:''}); }
  });
  const debtRemainUSD=totalDebtUSD-totalPaidUSD;
  const paidPct=totalDebtUSD>0?Math.min(100,(totalPaidUSD/totalDebtUSD)*100):100;
  txs.sort((a,b)=>(b.date||'')>(a.date||'')?1:-1);
  return{name,phone,token,totalBoughtUSD,totalDebtUSD,totalPaidUSD,debtRemainUSD,paidPct,txs};
}

let activeTab='summary';

function render(){
  const token=getTokenFromURL(), root=document.getElementById('root');
  if(!token){ root.innerHTML=errPage('🔗','لینکت دروست نییە','ئەم پەیجە تەنها لە ڕێگەی لینکی تایبەتەوە کراوە دەبێت.<br>تکایە لە فرۆشیارەکەت بخوازە لینکەکەت بنێردرێت.'); return; }
  const cust=getCustomerData(token);
  if(!cust){ root.innerHTML=errPage('🔍','هیچ مامەڵەیەک نەدۆزرایەوە','یان لینکەکە کۆنە، یان هێشتا هیچ مامەڵەیەک تۆمار نەکراوە.'); return; }

  const hasDebt=cust.debtRemainUSD>0.001;
  const debtIQD=fromUSD(cust.debtRemainUSD,'IQD');
  const boughtIQD=fromUSD(cust.totalBoughtUSD,'IQD');
  const paidIQD=fromUSD(cust.totalPaidUSD,'IQD');
  const waMsg=encodeURIComponent(`سڵاو ${cust.name} 👋\n\n📊 مامەڵەکانت:\n🛒 کۆی کڕین: ${fmtC(boughtIQD,'IQD')}\n✅ دراوەتەوە: ${fmtC(paidIQD,'IQD')}\n`+(hasDebt?`⚠️ قەرزی مانەوە: ${fmtC(debtIQD,'IQD')}\n\n`:'\n')+`بۆ بینینی هەموو مامەڵەکانت:\n${location.href}`);
  const waLink=cust.phone?`https://wa.me/${cust.phone.replace(/\D/g,'')}?text=${waMsg}`:`https://wa.me/?text=${waMsg}`;

  root.innerHTML=`
    <div class="header">
      <div class="header-inner">
        <div class="shop-logo">🏪</div>
        <div class="shop-name">مامەڵەکانم</div>
        <div class="customer-welcome">بەخێربێیت، ${escHtml(cust.name)}</div>
        <span class="debt-pill ${hasDebt?'has-debt':'no-debt'}">${hasDebt?`⚠️ قەرزت هەیە: ${fmtC(debtIQD,'IQD')}`:'✅ هیچ قەرزێکت نییە'}</span>
        <div class="quick-stats">
          <div class="qs-item"><div class="qs-val">${fmtC(boughtIQD,'IQD')}</div><div class="qs-lbl">کۆی کڕین</div></div>
          <div class="qs-item"><div class="qs-val ${hasDebt?'tbad':'tok'}">${fmtC(debtIQD,'IQD')}</div><div class="qs-lbl">قەرز</div></div>
          <div class="qs-item"><div class="qs-val tok">${fmtC(paidIQD,'IQD')}</div><div class="qs-lbl">دراوەتەوە</div></div>
        </div>
      </div>
    </div>
    <div class="tabs-wrap no-print">
      <div class="tabs">
        <div class="tab ${activeTab==='summary'?'active':''}" onclick="switchTab('summary')"><span>📊</span> خولاصە</div>
        <div class="tab ${activeTab==='history'?'active':''}" onclick="switchTab('history')"><span>📋</span> مێژوو</div>
      </div>
    </div>
    <div class="content">
      ${activeTab==='summary'?renderSummary(cust,hasDebt,debtIQD,boughtIQD,paidIQD,waLink):renderHistory(cust,waLink)}
    </div>
    <div class="footer">مامەڵەکانت · ${new Date().toLocaleDateString('ar-IQ')} · v2.2</div>`;
}

function renderSummary(cust,hasDebt,debtIQD,boughtIQD,paidIQD,waLink){
  const recent=cust.txs.slice(0,3);
  return `
    <div class="sgrid">
      <div class="scard info"><div class="si">🛒</div><div class="sv tprimary">${fmtC(boughtIQD,'IQD')}</div><div class="sl">کۆی کڕین</div></div>
      <div class="scard ${hasDebt?'bad':'ok'}"><div class="si">${hasDebt?'⚠️':'✅'}</div><div class="sv ${hasDebt?'tbad':'tok'}">${fmtC(debtIQD,'IQD')}</div><div class="sl">قەرزی مانەوە</div></div>
      <div class="scard ok"><div class="si">💳</div><div class="sv tok">${fmtC(paidIQD,'IQD')}</div><div class="sl">دراوەتەوە</div></div>
      <div class="scard"><div class="si">📦</div><div class="sv">${cust.txs.filter(t=>t.type!=='debt_pay').length}</div><div class="sl">کۆی مامەڵە</div></div>
    </div>
    ${hasDebt?`
    <div class="card">
      <div class="ctitle">💳 ئەوضەعی قەرز</div>
      <div class="sum-box" style="margin-bottom:0">
        <div class="sum-row"><span class="lbl">کۆی قەرز</span><span class="val tbad">${fmtC(fromUSD(cust.totalDebtUSD,'IQD'),'IQD')}</span></div>
        <div class="sum-row"><span class="lbl tok">✅ دراوەتەوە</span><span class="val tok">${fmtC(paidIQD,'IQD')}</span></div>
        <div class="sum-total"><span>⚠️ مانەوە</span><span class="tbad">${fmtC(debtIQD,'IQD')}</span></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${cust.paidPct}%;background:${cust.paidPct>=100?'var(--ok)':cust.paidPct>50?'var(--warn)':'var(--bad)'}"></div></div>
      <div class="progress-label">${fmtN(cust.paidPct,1)}% دراوەتەوە</div>
    </div>
    `:`
    <div style="background:var(--ok-bg);border:1px solid rgba(52,211,153,.25);border-radius:var(--r);padding:18px;text-align:center;margin-bottom:12px">
      <div style="font-size:32px;margin-bottom:8px">🎉</div>
      <div style="color:var(--ok);font-weight:800;font-size:15px;margin-bottom:3px">هیچ قەرزێکت نییە!</div>
      <div style="color:var(--muted);font-size:12px">هەموو پارەکانت دراوەتەوە — سوپاس!</div>
    </div>
    `}
    ${recent.length?`
    <div class="card">
      <div class="ctitle">⏱️ دوایین مامەڵەکان <span style="color:var(--primary);cursor:pointer;font-size:11px;font-weight:600" onclick="switchTab('history')">هەموو ببینە ←</span></div>
      <div class="ev-list">${recent.map(buildEvItem).join('')}</div>
    </div>`:''}
    <div class="no-print">
      <a href="${waLink}" target="_blank" class="wa-btn">${waIcon()} ناردنی مامەڵەکان بە واتساپ</a>
      <button class="print-btn" onclick="doPrint()">🖨️ چاپکردن / پاشەکەوتکردن بە PDF</button>
    </div>`;
}

function renderHistory(cust,waLink){
  if(!cust.txs.length) return `<div class="empty"><span class="ei">📋</span><p>هیچ مامەڵەیەک نییە</p></div>`;
  const groups={};
  cust.txs.forEach(tx=>{ const k=(tx.date||'—').slice(0,7); if(!groups[k])groups[k]=[]; groups[k].push(tx); });
  let html='';
  Object.entries(groups).sort((a,b)=>b[0]>a[0]?1:-1).forEach(([m,txs])=>{
    let lbl=m; try{lbl=new Date(m+'-01').toLocaleDateString('ar-IQ',{year:'numeric',month:'long'});}catch{}
    html+=`<div style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin:14px 0 7px">${lbl}</div>`;
    html+=`<div class="ev-list">${txs.map(buildEvItem).join('')}</div>`;
  });
  return `
    <div style="background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.15);border-radius:var(--rs);padding:9px 13px;font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px">
      📋 مێژووی هەموو مامەڵەکانت لێرەدایە
    </div>
    ${html}
    <div class="no-print" style="margin-top:14px">
      <button class="print-btn" onclick="doPrint()">🖨️ چاپکردن / پاشەکەوتکردن بە PDF</button>
    </div>`;
}

// ===== PDF PRINT =====
function doPrint(){
  const token=getTokenFromURL(), cust=getCustomerData(token);
  if(!cust) return;
  const hasDebt=cust.debtRemainUSD>0.001;
  const debtIQD=fromUSD(cust.debtRemainUSD,'IQD');
  const boughtIQD=fromUSD(cust.totalBoughtUSD,'IQD');
  const paidIQD=fromUSD(cust.totalPaidUSD,'IQD');
  const printDate=new Date().toLocaleDateString('ar-IQ',{year:'numeric',month:'long',day:'numeric'});

  const icons={sell_cash:'💵',sell_debt:'📝',debt_pay:'✅'};
  const labels={sell_cash:'کڕینی نەقد',sell_debt:'کڕینی قەرز',debt_pay:'پارەدانەوە'};
  const txsHTML=cust.txs.map(tx=>`
    <tr style="border-bottom:1px solid #eee">
      <td style="padding:7px 8px">${icons[tx.type]||'📌'} ${labels[tx.type]||tx.type}</td>
      <td style="padding:7px 8px">${tx.date||''}</td>
      <td style="padding:7px 8px">${tx.prod?escHtml(tx.prod):''} ${tx.qty!=null?'('+fmtN(tx.qty,2)+' '+tx.unit+')':''}</td>
      <td style="padding:7px 8px;font-weight:700;color:${tx.type==='debt_pay'?'#059669':tx.type==='sell_debt'?'#dc2626':'#2563eb'};text-align:left">${fmtC(tx.amount,tx.currency)}</td>
    </tr>`).join('');

  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مامەڵەکانم — ${escHtml(cust.name)}</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Arabic',Arial,sans-serif;color:#111;background:#fff;font-size:12px;direction:rtl;padding:14mm}
.header-box{background:#0f2040;color:#fff;border-radius:10px;padding:18px 20px;margin-bottom:18px;text-align:center;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.shop-title{font-size:18px;font-weight:800;margin-bottom:4px}
.cust-sub{font-size:12px;opacity:.7;margin-bottom:10px}
.pill{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700}
.pill.d{background:rgba(248,113,113,.2);color:#f87171;border:1px solid rgba(248,113,113,.4)}
.pill.ok{background:rgba(52,211,153,.2);color:#34d399;border:1px solid rgba(52,211,153,.4)}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.sc{border:1px solid #ddd;border-radius:8px;padding:12px;text-align:center}
.sc.info{background:#eff6ff;border-color:#93c5fd}.sc.ok{background:#ecfdf5;border-color:#6ee7b7}.sc.bad{background:#fef2f2;border-color:#fca5a5}
.sv{font-size:13px;font-weight:800;margin:3px 0}.sl{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.sbox{background:#eff6ff;border:1px solid #c0d4f0;border-radius:8px;padding:12px;margin-bottom:14px}
.srow{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px dashed #ddd}.srow:last-child{border:none}
.stotal{display:flex;justify-content:space-between;font-size:14px;font-weight:800;padding-top:8px;margin-top:5px;border-top:2px solid #c0d4f0}
.pbar{height:7px;background:#e5e7eb;border-radius:4px;overflow:hidden;margin-top:8px}
.pfill{height:100%;border-radius:4px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.plbl{font-size:10px;color:#666;margin-top:3px;text-align:left}
table{width:100%;border-collapse:collapse}
th{background:#1a3a5c;color:#fff;padding:8px 10px;text-align:right;font-size:11px;-webkit-print-color-adjust:exact}
td{padding:6px 8px;font-size:12px}
.tok{color:#059669}.tbad{color:#dc2626}.tprimary{color:#2563eb}
.footer{text-align:center;margin-top:18px;padding-top:10px;border-top:1px solid #eee;font-size:10px;color:#999}
@page{margin:12mm;size:A4}@media print{body{padding:0}}
</style>
</head>
<body>
<div class="header-box">
  <div class="shop-title">🏪 مامەڵەکانم</div>
  <div class="cust-sub">ناوی کڕیار: ${escHtml(cust.name)}${cust.phone?' · 📞 '+escHtml(cust.phone):''}</div>
  <span class="pill ${hasDebt?'d':'ok'}">${hasDebt?`⚠️ قەرزی مانەوە: ${fmtC(debtIQD,'IQD')}`:'✅ هیچ قەرزێکت نییە'}</span>
</div>

<div class="grid3">
  <div class="sc info"><div>🛒</div><div class="sv tprimary">${fmtC(boughtIQD,'IQD')}</div><div class="sl">کۆی کڕین</div></div>
  <div class="sc ${hasDebt?'bad':'ok'}"><div>${hasDebt?'⚠️':'✅'}</div><div class="sv ${hasDebt?'tbad':'tok'}">${fmtC(debtIQD,'IQD')}</div><div class="sl">قەرزی مانەوە</div></div>
  <div class="sc ok"><div>💳</div><div class="sv tok">${fmtC(paidIQD,'IQD')}</div><div class="sl">دراوەتەوە</div></div>
</div>

${hasDebt?`
<div class="sbox">
  <div class="srow"><span>کۆی قەرز</span><span class="tbad">${fmtC(fromUSD(cust.totalDebtUSD,'IQD'),'IQD')}</span></div>
  <div class="srow"><span style="color:#059669">✅ دراوەتەوە</span><span class="tok">${fmtC(paidIQD,'IQD')}</span></div>
  <div class="stotal"><span>⚠️ مانەوە</span><span class="tbad">${fmtC(debtIQD,'IQD')}</span></div>
</div>
<div class="pbar"><div class="pfill" style="width:${cust.paidPct}%;background:${cust.paidPct>=100?'#059669':cust.paidPct>50?'#d97706':'#dc2626'}"></div></div>
<div class="plbl">${fmtN(cust.paidPct,1)}% دراوەتەوە</div>
`:''}

<div style="font-size:11px;font-weight:700;color:#666;margin:16px 0 8px;text-transform:uppercase;letter-spacing:.5px">📋 مێژووی هەموو مامەڵەکان</div>
<table>
  <thead><tr><th>جۆر</th><th>بەروار</th><th>کاڵا</th><th style="text-align:left">بڕی پارە</th></tr></thead>
  <tbody>${txsHTML||'<tr><td colspan="4" style="text-align:center;color:#999;padding:20px">هیچ مامەڵەیەک نییە</td></tr>'}</tbody>
</table>

<div class="footer">مامەڵەکانت · بەروار: ${printDate} · v2.2</div>
</body></html>`);
  win.document.close();
  win.onload=()=>{ win.focus(); win.print(); };
}

function switchTab(tab){ activeTab=tab; render(); window.scrollTo({top:document.querySelector('.tabs-wrap')?.offsetTop||0,behavior:'smooth'}); }

function buildEvItem(tx){
  const icons={sell_cash:'💵',sell_debt:'📝',debt_pay:'✅'};
  const labels={sell_cash:'کڕینی نەقد',sell_debt:'کڕینی قەرز',debt_pay:'پارەدانەوە'};
  const amtCls=tx.type==='debt_pay'?'tok':tx.type==='sell_debt'?'tbad':'tprimary';
  const due=tx.dueDate?`<span class="badge b-warn" style="margin-right:4px">⏰ ${tx.dueDate}</span>`:'';
  return `<div class="ev-item">
    <div class="ev-icon">${icons[tx.type]||'📌'}</div>
    <div class="ev-info">
      <div class="ev-title">${labels[tx.type]}${tx.prod?' — '+escHtml(tx.prod):''}${tx.qty!=null?' ('+fmtN(tx.qty,2)+' '+tx.unit+')':''}</div>
      <div class="ev-meta">${tx.date||''}${tx.note?' · '+escHtml(tx.note):''} ${due}</div>
    </div>
    <div class="ev-amount ${amtCls}">${fmtC(tx.amount,tx.currency)}</div>
  </div>`;
}
