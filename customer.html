<!-- ====== customer.html ====== -->
<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مامەڵەکانم</title>
<meta name="description" content="بینینی مامەڵە و قەرزی کڕیار بە شێوەیەکی خێرا و گونجاو لە مۆبایل و ئۆفلاین.">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="مامەڵەکانم">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e1a; --bg2:#0f1525; --bg3:#141c2e; --card:#111827;
  --border:#1e2d45; --border2:#2a3f5f;
  --primary:#4f8ef7; --primary-d:#3a6fd4;
  --ok:#34d399; --ok-bg:rgba(52,211,153,.1);
  --bad:#f87171; --bad-bg:rgba(248,113,113,.1);
  --warn:#fbbf24; --warn-bg:rgba(251,191,36,.1);
  --text:#e2e8f0; --muted:#6b7fa3; --faint:#2a3f5f;
  --r:14px; --rs:9px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;font-size:14px;overflow-x:hidden}
button,input,select,textarea{font:inherit}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.skip-link{position:fixed;top:10px;right:10px;z-index:1000;padding:10px 14px;border-radius:10px;background:var(--primary);color:#fff;text-decoration:none;transform:translateY(-160%);transition:transform .2s ease}
.skip-link:focus{transform:translateY(0)}
:where(button,[href],input,select,textarea):focus-visible{outline:2px solid var(--primary);outline-offset:3px}

.header{background:linear-gradient(160deg,#071630 0%,#0f2040 40%,#0d2850 100%);padding:28px 20px 0;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(79,142,247,.18) 0%,transparent 70%);pointer-events:none}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(79,142,247,.3),transparent)}
.header-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center}
.shop-logo{width:58px;height:58px;background:linear-gradient(135deg,rgba(79,142,247,.2),rgba(79,142,247,.05));border:1.5px solid rgba(79,142,247,.3);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:12px;box-shadow:0 0 30px rgba(79,142,247,.15)}
.shop-name{font-size:19px;font-weight:800;color:#fff;margin-bottom:3px}
.customer-welcome{font-size:12px;color:rgba(255,255,255,.45);margin-bottom:16px}
.debt-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:20px}
.debt-pill.has-debt{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:var(--bad)}
.debt-pill.no-debt{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);color:var(--ok)}
.quick-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid rgba(255,255,255,.06);margin:0 -20px}
.qs-item{padding:12px 8px;text-align:center;border-left:1px solid rgba(255,255,255,.06)}
.qs-item:last-child{border-left:none}
.qs-val{font-size:13px;font-weight:800;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qs-lbl{font-size:9px;color:var(--muted);letter-spacing:.5px;font-weight:600;text-transform:uppercase}

.tabs-wrap{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;backdrop-filter:blur(12px)}
.tabs{display:flex;max-width:600px;margin:0 auto}
.tab{flex:1;padding:13px 4px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);border:none;border-bottom:2px solid transparent;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:5px;background:none;font-family:inherit}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);background:rgba(79,142,247,.04)}
.tab:active{opacity:.7}
.tab-link-btn{color:var(--primary);cursor:pointer;font-size:11px;font-weight:600;background:none;border:none;font-family:inherit}

.content{padding:14px 14px 30px;max-width:600px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.ctitle{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:12px;letter-spacing:.6px;text-transform:uppercase;display:flex;align-items:center;gap:6px;justify-content:space-between}

.sum-box{background:linear-gradient(135deg,rgba(79,142,247,.08),rgba(79,142,247,.03));border:1px solid rgba(79,142,247,.2);border-radius:var(--r);padding:14px;margin-bottom:12px}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04)}
.sum-row:last-child{border:none}
.sum-row .lbl{color:var(--muted);font-size:12px}
.sum-row .val{font-weight:700}
.sum-total{display:flex;justify-content:space-between;align-items:center;padding:9px 0 0;margin-top:6px;border-top:1px solid rgba(255,255,255,.1);font-size:15px;font-weight:800}

.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.scard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:13px 10px;text-align:center}
.scard.ok{border-color:rgba(52,211,153,.25);background:var(--ok-bg)}
.scard.bad{border-color:rgba(248,113,113,.25);background:var(--bad-bg)}
.scard.info{border-color:rgba(79,142,247,.25);background:rgba(79,142,247,.07)}
.sv{font-size:14px;font-weight:800;margin:4px 0 3px}
.sl{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.si{font-size:20px}

.ev-list{display:flex;flex-direction:column;gap:7px}
.ev-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:11px 13px;display:flex;align-items:center;gap:10px;animation:fadeUp .2s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.ev-icon{font-size:18px;flex-shrink:0;width:32px;text-align:center}
.ev-info{flex:1;min-width:0}
.ev-title{font-size:12px;font-weight:600;margin-bottom:2px}
.ev-meta{font-size:11px;color:var(--muted);line-height:1.4}
.ev-amount{font-size:13px;font-weight:800;flex-shrink:0;text-align:left}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.b-ok{background:var(--ok-bg);color:var(--ok)}
.b-bad{background:var(--bad-bg);color:var(--bad)}
.b-warn{background:var(--warn-bg);color:var(--warn)}
.b-info{background:rgba(79,142,247,.1);color:var(--primary)}

.wa-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,#128C7E,#25D366);color:#fff;border:none;border-radius:var(--rs);padding:13px 20px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;width:100%;text-decoration:none;transition:all .2s;box-shadow:0 4px 20px rgba(37,211,102,.2);margin-bottom:8px}
.wa-btn:hover{box-shadow:0 6px 28px rgba(37,211,102,.35);transform:translateY(-1px)}
.wa-btn svg{width:19px;height:19px;fill:#fff;flex-shrink:0}

.print-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,#1e3a5f,#2a4f7f);color:#fff;border:1px solid rgba(79,142,247,.3);border-radius:var(--rs);padding:12px 20px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;width:100%;transition:all .2s}
.print-btn:hover{background:linear-gradient(135deg,#2a4f7f,#3a6fd4)}
.print-btn:active{transform:scale(.98)}

.progress-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:10px}
.progress-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.progress-label{font-size:10px;color:var(--muted);margin-top:4px;text-align:left}

.tok{color:var(--ok)}.tbad{color:var(--bad)}.twarn{color:var(--warn)}.tprimary{color:var(--primary)}.fw8{font-weight:800}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .ei{font-size:40px;display:block;margin-bottom:12px;opacity:.6}
.empty p{font-size:12px;line-height:1.8}
.footer{text-align:center;padding:24px 20px;color:var(--faint);font-size:10px;letter-spacing:.5px}

/* PRINT */
@media print{
  .tabs-wrap,.wa-btn,.print-btn,.no-print{display:none!important}
  body{background:#fff!important;color:#111!important}
  .header{background:#0f2040!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .shop-name{color:#fff!important}
  .customer-welcome{color:rgba(255,255,255,.7)!important}
  .qs-val{color:#111!important}
  .quick-stats{background:#f5f7fa}
  .content{padding:0!important;max-width:100%!important}
  .card{background:#fff!important;border:1px solid #ddd!important;page-break-inside:avoid}
  .ctitle{color:#666!important}
  .sum-box{background:#eff6ff!important;border:1px solid #c0d4f0!important;-webkit-print-color-adjust:exact}
  .sum-row .lbl{color:#666!important}
  .ev-item{background:#f9fafb!important;border:1px solid #e5e7eb!important;page-break-inside:avoid}
  .ev-meta{color:#666!important}
  .sgrid{display:grid!important;grid-template-columns:1fr 1fr!important}
  .scard{background:#f9fafb!important;border:1px solid #e5e7eb!important}
  .scard.ok{background:#ecfdf5!important;border-color:#6ee7b7!important;-webkit-print-color-adjust:exact}
  .scard.bad{background:#fef2f2!important;border-color:#fca5a5!important;-webkit-print-color-adjust:exact}
  .scard.info{background:#eff6ff!important;border-color:#93c5fd!important;-webkit-print-color-adjust:exact}
  .sv,.sl{color:#333!important}
  .tok{color:#059669!important}.tbad{color:#dc2626!important}.tprimary{color:#2563eb!important}
  .progress-bar{background:#e5e7eb!important}
  .progress-fill{-webkit-print-color-adjust:exact!important}
  .debt-pill.has-debt{background:#fef2f2!important;color:#dc2626!important;border-color:#fca5a5!important;-webkit-print-color-adjust:exact}
  .debt-pill.no-debt{background:#ecfdf5!important;color:#059669!important;border-color:#6ee7b7!important;-webkit-print-color-adjust:exact}
  .badge.b-ok{background:#ecfdf5!important;color:#059669!important}
  .badge.b-bad{background:#fef2f2!important;color:#dc2626!important}
  .badge.b-warn{background:#fffbeb!important;color:#d97706!important}
  .footer{color:#999!important}
  @page{margin:12mm;size:A4}
}
</style>
</head>
<body>
<a class="skip-link" href="#root">بازدان بۆ ناوەڕۆک</a>

<div id="root" role="main" tabindex="-1" aria-busy="true">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px">
    <div style="width:32px;height:32px;border:2.5px solid #1e2d45;border-top-color:#4f8ef7;border-radius:50%;animation:spin .8s linear infinite"></div>
    <div style="color:#6b7fa3;font-size:12px">چاوەڕێبە...</div>
  </div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<!-- utils.js پێشتر بار دەبێت: escHtml, today, fmtN, fmtC, fmtDual, toUSD, fromUSD, legacyHashToken -->
<script src="utils.js"></script>
<script src="cloud.js"></script>
<script>
// ===== DB (Read-only — تەنها خوێندنەوە) =====
// customer.html داتا نانوسێت — تەنها دەیخوێنێتەوە
const DB = {
  ready: () => PMStorage.ready(),
  get: k => PMStorage.getSync(k)
};

function getCurrencies() {
  return DB.get('currencies') || [
    { code: 'IQD', name: 'دینار عێراقی',    flag: '🇮🇶', rateToUSD: 1310,   symbol: 'IQD' },
    { code: 'USD', name: 'دۆلاری ئەمەریکی', flag: '🇺🇸', rateToUSD: 1,      symbol: '$'   },
    { code: 'TRY', name: 'لیرەی تورک',      flag: '🇹🇷', rateToUSD: 32.5,   symbol: '₺'   },
    { code: 'EUR', name: 'یۆرۆ',            flag: '🇪🇺', rateToUSD: 0.92,   symbol: '€'   },
    { code: 'IRR', name: 'ڕیالی ئێران',     flag: '🇮🇷', rateToUSD: 42000,  symbol: '﷼'   },
    { code: 'SAR', name: 'ڕیال سعودی',      flag: '🇸🇦', rateToUSD: 3.75,   symbol: 'SR'  },
    { code: 'CNY', name: 'یوانی چین',       flag: '🇨🇳', rateToUSD: 7.24,   symbol: '¥'   },
  ];
}

// escHtml, today, fmtN, fmtC, toUSD, fromUSD, legacyHashToken, roundMoney, normalizePhone, validateToken → utils.js
function getProducts() { return DB.get('products') || []; }
function getAllEvents() { return DB.get('events') || []; }

const CUSTOMER_EVENT_TYPES = new Set(['sell_cash', 'sell_debt', 'debt_pay']);
const HIST_PAGE_SIZE = 20;
let activeTab = 'summary';
let histPage = 1;
let currentToken = '';
let currentCustomer = null;

function isCustomerEvent(ev) {
  return !!ev && CUSTOMER_EVENT_TYPES.has(ev.type);
}

function showLoadingState(msg = 'ناوەڕۆک بار دەکرێت...') {
  const root = document.getElementById('root');
  if (!root) return;
  root.setAttribute('aria-busy', 'true');
  root.innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px">
      <div style="width:32px;height:32px;border:2.5px solid #1e2d45;border-top-color:#4f8ef7;border-radius:50%;animation:spin .8s linear infinite"></div>
      <div style="color:#6b7fa3;font-size:12px">${escHtml(msg)}</div>
    </div>`;
}

function getTokenFromURL() {
  const p = new URLSearchParams(location.search);
  const t = (p.get('t') || p.get('token') || '').trim();
  if (t && !validateToken(t)) {
    console.warn('[customer.html] Invalid token:', t);
    return '';
  }
  return t;
}

function safeReadStore(key, label) {
  try {
    const parsed = DB.get(key);
    if (parsed == null) return {};
    if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) {
      console.warn(`[${label}] invalid store shape, resetting`);
      PMStorage.setSync(key, {});
      return {};
    }
    return parsed;
  } catch (e) {
    console.warn(`[${label}] corrupted store, resetting`, e);
    PMStorage.setSync(key, {});
    return {};
  }
}

function safeWriteStore(key, value, label) {
  try {
    PMStorage.setSync(key, value || {});
  } catch (e) {
    console.warn(`[${label}] write failed`, e);
  }
}

function resolveEventTokenForIndex(ev, registry) {
  if (!ev || typeof ev !== 'object') return '';
  if (ev.customerToken && validateToken(ev.customerToken)) return ev.customerToken;

  const buyer = (ev.buyer || '').trim();
  const normPhone = normalizePhone(ev.phone || '');
  if (!buyer && !normPhone) return '';

  if (normPhone && registry[normPhone] && validateToken(registry[normPhone].token)) {
    return registry[normPhone].token;
  }
  if (buyer && registry[buyer] && validateToken(registry[buyer].token)) {
    return registry[buyer].token;
  }

  const legacyNorm = legacyHashToken(buyer, normPhone);
  if (legacyNorm && validateToken(legacyNorm)) return legacyNorm;

  const legacyRaw = legacyHashToken(buyer, ev.phone || '');
  if (legacyRaw && validateToken(legacyRaw)) return legacyRaw;

  return '';
}

function buildCustomerEventIndexFallback() {
  const events = getAllEvents();
  const registry = DB.get('customerTokens') || {};
  const index = {};

  events.forEach(ev => {
    try {
      if (!isCustomerEvent(ev) || ev.id == null) return;
      const token = resolveEventTokenForIndex(ev, registry);
      if (!token || !validateToken(token)) return;
      if (!index[token]) index[token] = [];
      index[token].push(ev.id);
    } catch (e) {
      console.warn('[customer.html] skip broken event while rebuilding index', ev?.id, e);
    }
  });

  safeWriteStore('eventIndex', index, 'pm_eventIndex');
  return index;
}

function getCustomerEventIds(token) {
  if (!token || !validateToken(token)) return [];
  if (!getCustomerTokenAccessState(token).ok) return [];

  let index = safeReadStore('eventIndex', 'pm_eventIndex');
  if (!Object.keys(index).length && getAllEvents().length) {
    index = buildCustomerEventIndexFallback();
  }

  let ids = index[token];
  if (ids != null && !Array.isArray(ids)) {
    index = buildCustomerEventIndexFallback();
    ids = index[token];
  }

  if (!Array.isArray(ids)) return [];
  return [...new Set(ids.filter(id => id != null))];
}

function isCompleteCustomerSummary(summary) {
  return !!summary
    && typeof summary === 'object'
    && validateToken(summary.token || '')
    && Array.isArray(summary.txs)
    && Array.isArray(summary.productBreakdown);
}

function getCachedCustomerSummary(token) {
  if (!token || !validateToken(token)) return null;
  if (!getCustomerTokenAccessState(token).ok) return null;
  const cache = safeReadStore('customerCache', 'pm_customerCache');
  const entry = cache[token];
  if (!entry || !entry.data || !isCompleteCustomerSummary(entry.data)) return null;
  return entry.data;
}

function saveCachedCustomerSummary(token, summary) {
  if (!token || !validateToken(token) || !isCompleteCustomerSummary(summary)) return;
  const cache = safeReadStore('customerCache', 'pm_customerCache');
  cache[token] = {
    savedAt: new Date().toISOString(),
    data: summary,
  };
  safeWriteStore('customerCache', cache, 'pm_customerCache');
}

function eventBelongsToToken(ev, token, regEntry, registry) {
  if (!isCustomerEvent(ev)) return false;
  if (ev.customerToken === token) return true;

  const regPhone = normalizePhone(regEntry?.phone || '');
  if (regPhone && ev.phone && normalizePhone(ev.phone) === regPhone) return true;

  if (!ev.customerToken && (ev.buyer || ev.phone)) {
    const byRegistry = resolveEventTokenForIndex(ev, registry);
    if (byRegistry && byRegistry === token) return true;

    const legacyNorm = legacyHashToken(ev.buyer || '', normalizePhone(ev.phone || ''));
    if (legacyNorm === token) return true;

    const legacyRaw = legacyHashToken(ev.buyer || '', ev.phone || '');
    if (legacyRaw === token) return true;
  }

  return false;
}

function getCustomerData(token, opts = {}) {
  if (!token || !validateToken(token)) return null;
  const access = getCustomerTokenAccessState(token);
  if (!access.ok) return null;

  const allEvs = getAllEvents();
  const prods = getProducts();
  const regEntry = access.entry || lookupCustomerByToken(token);
  const registry = DB.get('customerTokens') || {};

  const preferIndex = opts.preferIndex !== false;
  const allowFullScan = opts.allowFullScan !== false;

  let myEvs = [];

  if (preferIndex) {
    const eventIds = getCustomerEventIds(token);
    if (eventIds.length) {
      const evMap = new Map();
      allEvs.forEach(ev => {
        if (ev && ev.id != null) evMap.set(String(ev.id), ev);
      });
      myEvs = eventIds
        .map(id => evMap.get(String(id)))
        .filter(ev => isCustomerEvent(ev));
    }
  }

  if (!myEvs.length && allowFullScan) {
    myEvs = allEvs.filter(ev => eventBelongsToToken(ev, token, regEntry, registry));
  }

  if (!myEvs.length) return null;

  const first = myEvs.find(e => e.buyer) || myEvs[0];
  const name  = regEntry?.name || first.buyer || 'کڕیار';
  const phone = normalizePhone(regEntry?.phone || first.phone || '');

  let totalBoughtUSD = 0;
  let totalDebtUSD = 0;
  let totalPaidUSD = 0;
  const txs = [];

  myEvs.forEach(ev => {
    const prod = prods.find(p => p.id == ev.productId);
    const pname = prod ? prod.name : '—';
    const punit = prod ? prod.unit : '';

    if (ev.type === 'sell_cash') {
      totalBoughtUSD += toUSD(ev.totalPrice, ev.currency);
      txs.push({ type: 'sell_cash', date: ev.date || '', prod: pname, unit: punit, qty: ev.qty, amount: ev.totalPrice, currency: ev.currency, note: ev.note || '', discountAmount: ev.discountAmount || 0 });
    }

    if (ev.type === 'sell_debt') {
      totalBoughtUSD += toUSD(ev.totalPrice, ev.currency);
      totalDebtUSD   += toUSD(ev.totalPrice, ev.currency);
      txs.push({ type: 'sell_debt', date: ev.date || '', prod: pname, unit: punit, qty: ev.qty, amount: ev.totalPrice, currency: ev.currency, dueDate: ev.dueDate || '', note: ev.note || '', discountAmount: ev.discountAmount || 0 });
    }

    if (ev.type === 'debt_pay') {
      totalPaidUSD += toUSD(ev.amount, ev.currency);
      const dpProd = prods.find(p2 => p2.id == ev.productId);
      txs.push({ type: 'debt_pay', date: ev.date || '', prod: dpProd ? dpProd.name : '', unit: '', qty: null, amount: ev.amount, currency: ev.currency, note: ev.note || '' });
    }
  });

  const debtRemainUSD = Math.max(0, roundMoney(totalDebtUSD - totalPaidUSD));
  const paidPct = totalDebtUSD > 0 ? Math.min(100, roundMoney((totalPaidUSD / totalDebtUSD) * 100)) : 100;
  txs.sort((a, b) => (b.date || '') > (a.date || '') ? 1 : -1);

  const prodMap2 = {};
  myEvs.forEach(ev => {
    if (ev.type !== 'sell_debt') return;
    const prod  = prods.find(p => p.id == ev.productId);
    const pname = prod ? prod.name : '—';
    const pid   = ev.productId;
    if (!prodMap2[pid]) prodMap2[pid] = { prodId: pid, name: pname, debtUSD: 0, paidUSD: 0, dueDate: '' };
    prodMap2[pid].debtUSD += toUSD(ev.totalPrice, ev.currency);
    if (ev.dueDate && (!prodMap2[pid].dueDate || ev.dueDate > prodMap2[pid].dueDate)) {
      prodMap2[pid].dueDate = ev.dueDate;
    }
  });

  const totalProdDebt2 = Object.values(prodMap2).reduce((s, x) => s + x.debtUSD, 0);
  if (totalProdDebt2 > 0) {
    myEvs.filter(e => e.type === 'debt_pay').forEach(ev => {
      const payUSD = toUSD(ev.amount, ev.currency);
      Object.values(prodMap2).forEach(pm => {
        if (pm.debtUSD > 0) pm.paidUSD += payUSD * (pm.debtUSD / totalProdDebt2);
      });
    });
  }

  const productBreakdown = Object.values(prodMap2)
    .map(pm => ({ ...pm, remainUSD: Math.max(0, roundMoney(pm.debtUSD - pm.paidUSD)) }))
    .filter(pm => pm.debtUSD > 0)
    .sort((a, b) => b.remainUSD - a.remainUSD);

  return {
    name,
    phone,
    token,
    totalBoughtUSD: roundMoney(totalBoughtUSD),
    totalDebtUSD: roundMoney(totalDebtUSD),
    totalPaidUSD: roundMoney(totalPaidUSD),
    debtRemainUSD,
    paidPct,
    txs,
    productBreakdown,
  };
}

function bootCustomerPortal() {
  const root = document.getElementById('root');
  showLoadingState();

  requestAnimationFrame(async () => {
    try {
      await DB.ready();
      currentToken = getTokenFromURL();

      if (!currentToken || !validateToken(currentToken)) {
        root.setAttribute('aria-busy', 'false');
        root.innerHTML = errPage('🔗', 'لینکەکە دروست نییە', 'ئەم پەیجە تەنها بە لینکێکی تایبەت دەکرێت. تکایە لە فرۆشیارەکەت داوا بکە لینکەکەت بنێرێت.');
        return;
      }

      const localAccess = typeof getCustomerTokenAccessState === 'function'
        ? getCustomerTokenAccessState(currentToken)
        : { ok: true, code: 'active' };
      if (localAccess.code === 'revoked') {
        root.setAttribute('aria-busy', 'false');
        root.innerHTML = errPage('⛔', 'لینکەکە وەستاندراوە', 'ئەم لینکە لەلایەن فرۆشیارەکەتەوە وەستاندراوە.');
        return;
      }
      if (localAccess.code === 'expired') {
        root.setAttribute('aria-busy', 'false');
        root.innerHTML = errPage('⌛', 'لینکەکە بەسەرچووە', 'کاتی بەکارهێنانی ئەم لینکە تەواو بووە. تکایە لینکێکی نوێ داوا بکە.');
        return;
      }

      let cust = null;

      if (typeof window.fetchCustomerPortalData === 'function') {
        try {
          cust = await window.fetchCustomerPortalData(currentToken);
        } catch (remoteErr) {
          if (remoteErr?.code === 'REVOKED') {
            root.setAttribute('aria-busy', 'false');
            root.innerHTML = errPage('⛔', 'لینکەکە وەستاندراوە', 'ئەم لینکە لەلایەن فرۆشیارەکەتەوە وەستاندراوە.');
            return;
          }
          if (remoteErr?.code === 'EXPIRED') {
            root.setAttribute('aria-busy', 'false');

            return;
          }
        }
      }

      if (!cust) {
        cust = getCachedCustomerSummary(currentToken);
      }

      if (!cust) {
        cust = getCustomerData(currentToken, { preferIndex: true, allowFullScan: false });
      }

      if (!cust) {
        cust = getCustomerData(currentToken, { preferIndex: false, allowFullScan: true });
      }

      if (!cust) {
        root.setAttribute('aria-busy', 'false');
        root.innerHTML = errPage('🔍', 'هیچ مامەڵەیەک نەدۆزرایەوە', 'یان لینکەکە کۆنە، یان هێشتا هیچ مامەڵەیەک تۆمار نەکراوە.');
        return;
      }

      currentCustomer = cust;
      activeTab = 'summary';

      saveCachedCustomerSummary(currentToken, currentCustomer);
      render();
    } catch (e) {
      console.error('[customer.html] boot error:', e);
      root.setAttribute('aria-busy', 'false');
      root.innerHTML = errPage('⚠️', 'هەڵەیەک ڕوویدا', 'تکایە پەیجەکە دووبارە لۆد بکەرەوە.');
    }
  });
}

function changeHistoryPage(delta) {
  const total = currentCustomer?.txs?.length || 0;
  const totalPages = Math.max(1, Math.ceil(total / HIST_PAGE_SIZE));
  histPage = Math.min(totalPages, Math.max(1, histPage + delta));
  render();
}

function renderHistory(cust) {
  if (!cust.txs.length) {
    return `<div class="empty"><span class="ei">🭮</span><p>هیچ مامەڵەیەک بۆ ئەم کڕیارە تۆمار نەکراوە.</p></div>`;
  }

  const total = cust.txs.length;
  const totalPages = Math.max(1, Math.ceil(total / HIST_PAGE_SIZE));
  histPage = Math.min(totalPages, Math.max(1, histPage));

  const start = (histPage - 1) * HIST_PAGE_SIZE;
  const pageTxs = cust.txs.slice(start, start + HIST_PAGE_SIZE);

  const groups = {};
  pageTxs.forEach(tx => {
    const k = (tx.date || '—').slice(0, 7);
    if (!groups[k]) groups[k] = [];
    groups[k].push(tx);
  });

  let html = '';
  Object.entries(groups).sort((a, b) => b[0] > a[0] ? 1 : -1).forEach(([m, txs]) => {
    let lbl = m;
    try { lbl = new Date(m + '-01').toLocaleDateString('ar-IQ', { year:'numeric', month:'long' }); } catch {}
    html += `<div style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin:14px 0 7px">${lbl}</div>`;
    html += `<div class="ev-list">${txs.map(buildEvItem).join('')}</div>`;
  });

  const paginationHTML = total > HIST_PAGE_SIZE ? `
    <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-top:14px;padding:10px 0">
      <button onclick="changeHistoryPage(-1)" style="padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:inherit;cursor:pointer;font-size:12px;font-weight:600;${histPage<=1?'opacity:.35;cursor:not-allowed;':''}" ${histPage<=1?'disabled':''}>پێشوو</button>
      <span style="font-size:12px;color:var(--muted);font-weight:700">پەڕە ${histPage} لە ${totalPages}</span>
      <button onclick="changeHistoryPage(1)" style="padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:inherit;cursor:pointer;font-size:12px;font-weight:600;${histPage>=totalPages?'opacity:.35;cursor:not-allowed;':''}" ${histPage>=totalPages?'disabled':''}>دواتر</button>
    </div>` : '';

  return `
    <div style="background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.15);border-radius:var(--rs);padding:9px 13px;font-size:11px;color:var(--muted);text-align:center;margin-bottom:12px">
      📋 ${total} مامەڵە ${totalPages>1 ? `· پەڕە ${histPage} لە ${totalPages}` : ''}
    </div>
    ${html}
    ${paginationHTML}
    <div class="no-print" style="margin-top:14px">
      <button class="print-btn" onclick="doPrint()">🖨️ چاپکردن / پاشەکەوتکردن بە PDF</button>
    </div>`;
}

function switchTab(tab) {
  activeTab = tab;
  if (tab === 'history') histPage = 1;
  render();
  document.getElementById('customerTabPanel')?.focus({ preventScroll: true });
  window.scrollTo({ top: document.querySelector('.tabs-wrap')?.offsetTop || 0, behavior: 'smooth' });
}

function buildEvItem(tx) {
  const icons  = { sell_cash:'💵', sell_debt:'🧾', debt_pay:'✅' };
  const labels = { sell_cash:'کڕینی نەقد', sell_debt:'کڕینی قەرز', debt_pay:'پارەدانەوە' };
  const amtCls = tx.type==='debt_pay' ? 'tok' : tx.type==='sell_debt' ? 'tbad' : 'tprimary';
  const due    = tx.dueDate ? `<span class="badge b-warn" style="margin-right:4px">⏰ ${tx.dueDate}</span>` : '';
  const disc   = tx.discountAmount > 0 ? `<span class="badge b-warn" style="margin-right:4px">🏷️</span>` : '';
  return `<div class="ev-item">
    <div class="ev-icon">${icons[tx.type]||'📝'}</div>
    <div class="ev-info">
      <div class="ev-title">${labels[tx.type]||tx.type}${tx.prod?' — '+escHtml(tx.prod):''}${tx.qty!=null?' ('+fmtN(tx.qty,2)+' '+escHtml(tx.unit)+')':''}</div>
      <div class="ev-meta">${tx.date||''}${tx.note?' · '+escHtml(tx.note):''} ${disc}${due}</div>
    </div>
    <div class="ev-amount ${amtCls}">${fmtC(tx.amount,tx.currency)}</div>
  </div>`;
}
